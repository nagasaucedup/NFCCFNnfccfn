<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Arsenal Voicemail</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden;font-family:sans-serif}
.shell{position:relative;background:#000;overflow:hidden}

.bg{position:absolute;inset:0;z-index:0;background:radial-gradient(ellipse at 50% 30%,#cc0000 0%,#880000 40%,#3a0000 75%,#1a0000 100%)}
.dots{position:absolute;inset:0;z-index:1;pointer-events:none;opacity:0.35;background-image:radial-gradient(circle,#ff0000 1px,transparent 1px);background-size:8px 8px}
.wm{position:absolute;inset:0;z-index:2;pointer-events:none;display:flex;align-items:center;justify-content:center;opacity:0.07}
.scanlines{position:absolute;inset:0;z-index:11;pointer-events:none;background:repeating-linear-gradient(0deg,transparent 0px,transparent 2px,rgba(0,0,0,0.13) 2px,rgba(0,0,0,0.13) 4px)}
.vig{position:absolute;inset:0;z-index:12;pointer-events:none;background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,0.6) 100%)}
.flicker{position:absolute;inset:0;z-index:14;pointer-events:none;animation:fl 0.13s infinite}
@keyframes fl{0%{opacity:1}49%{opacity:0.97}50%{opacity:1}92%{opacity:0.94}100%{opacity:1}}
.nc{position:absolute;inset:0;z-index:15;pointer-events:none;opacity:0.04;width:100%;height:100%}
.cc{position:absolute;inset:0;z-index:13;pointer-events:none;width:100%;height:100%;opacity:0.45}

.ui{position:absolute;inset:0;z-index:5;display:flex;flex-direction:column}
.view{position:absolute;inset:0;z-index:6;display:none;flex-direction:column}
.view.active{display:flex}

.topbar{height:44px;display:flex;align-items:center;padding:0 10px;gap:8px;flex-shrink:0;background:#cc0000;border-bottom:2px solid #aa0000}
.back-btn{font-family:'Courier New',monospace;font-size:10px;color:#fff;background:rgba(0,0,0,0.25);border:1px solid rgba(255,255,255,0.4);border-radius:4px;padding:4px 8px;cursor:pointer;letter-spacing:1px;font-weight:bold;display:flex;align-items:center;gap:4px;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.screen-title{font-family:'Courier New',monospace;font-size:14px;color:#fff;font-weight:bold;letter-spacing:2px;text-transform:uppercase;flex:1;text-align:center}

/* SPLASH */
.splash-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;padding:20px}
.splash-title{font-family:'Courier New',monospace;font-size:13px;color:rgba(255,255,255,0.5);letter-spacing:3px;text-transform:uppercase;text-align:center}
.splash-btns{display:flex;gap:20px;justify-content:center;width:100%}
.splash-btn{display:flex;flex-direction:column;align-items:center;gap:12px;cursor:pointer;flex:1;-webkit-tap-highlight-color:transparent}
.splash-btn:active .sico{transform:scale(0.93)}
.sico{width:110px;height:110px;border-radius:50%;background:radial-gradient(circle at 38% 35%,#ff4444,#cc0000 50%,#880000);border:3px solid rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center;transition:transform 0.1s;box-shadow:0 4px 16px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.15)}
.sico-lbl{font-family:'Courier New',monospace;font-size:10px;color:rgba(255,255,255,0.7);letter-spacing:2px;text-transform:uppercase;text-align:center}
.select-bar{height:44px;display:flex;align-items:center;justify-content:center}
.sel-txt{font-family:'Courier New',monospace;font-size:18px;font-weight:bold;color:#fff;letter-spacing:6px;text-shadow:0 0 10px rgba(255,100,100,0.8),2px 0 0 rgba(255,0,0,0.4),-2px 0 0 rgba(0,0,255,0.2)}

/* PHONEBOOK */
.phonebook-list{flex:1;overflow-y:auto}
.pb-row{display:flex;align-items:center;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.07);background:rgba(20,0,0,0.55);transition:background 0.1s;position:relative;-webkit-tap-highlight-color:transparent}
.pb-row:active{background:rgba(180,0,0,0.4)}
.pb-photo-wrap{width:80px;height:80px;flex-shrink:0;overflow:hidden;background:#1a0000;display:flex;align-items:center;justify-content:center}
.pb-photo-wrap img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block}
.pb-photo-placeholder{width:80px;height:80px;background:radial-gradient(circle at 38% 35%,#cc2222,#660000);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pb-info{flex:1;padding:0 12px}
.pb-name{font-family:'Courier New',monospace;font-size:13px;font-weight:bold;color:#fff;letter-spacing:1px}
.pb-status{font-size:11px;font-family:'Courier New',monospace;margin-top:3px;letter-spacing:0.5px}
.pb-prog-wrap{position:absolute;bottom:0;left:80px;right:0;height:2px;background:rgba(255,255,255,0.05)}
.pb-prog-fill{height:100%;background:#ff4444;width:0%;box-shadow:0 0 4px #ff0000}

/* PLAYER */
.player-screen{flex:1;display:flex;flex-direction:column;overflow:hidden}
.player-card{display:flex;flex-direction:column;align-items:center;padding:20px 16px 14px;flex-shrink:0;background:rgba(10,0,0,0.5);border-bottom:1px solid rgba(255,255,255,0.08)}
.player-card-photo{width:120px;height:120px;border-radius:4px;overflow:hidden;background:radial-gradient(circle at 50% 30%,#cc2222,#440000);flex-shrink:0;display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,0.12)}
.player-card-photo img{width:100%;height:100%;object-fit:contain;object-position:center;display:block}
.player-card-name{font-family:'Courier New',monospace;font-size:16px;font-weight:bold;color:#fff;letter-spacing:2px;text-shadow:0 0 10px rgba(255,0,0,0.5);margin-top:12px}
.player-card-status{font-family:'Courier New',monospace;font-size:10px;margin-top:4px;letter-spacing:1px}
.player-vm-section{flex:1;display:flex;flex-direction:column;background:rgba(10,0,0,0.7);padding:12px}
.vm-play-card{border:1px solid rgba(255,255,255,0.15);border-radius:6px;background:rgba(0,0,0,0.4);padding:12px;margin-bottom:10px}
.vm-card-label{font-family:'Courier New',monospace;font-size:9px;color:rgba(255,255,255,0.4);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.vm-waveform{display:flex;align-items:center;gap:2px;height:36px;margin-bottom:8px}
.vm-wbar{width:4px;border-radius:2px;background:rgba(255,100,100,0.3);flex-shrink:0;transition:height 0.1s}
.vm-wbar.active{background:#ff4444;box-shadow:0 0 3px #ff0000}
.vm-controls{display:flex;align-items:center;gap:10px}
.vm-big-play{width:44px;height:44px;border-radius:50%;background:radial-gradient(circle at 38% 35%,#ff4444,#aa0000);border:2px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:transform 0.1s;-webkit-tap-highlight-color:transparent}
.vm-big-play:active{transform:scale(0.93)}
.vm-duration{font-family:'Courier New',monospace;font-size:11px;color:rgba(255,255,255,0.5);letter-spacing:1px;flex:1}
.vm-progress{flex:2;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden}
.vm-progress-fill{height:100%;background:#ff4444;width:0%;transition:width 0.1s;box-shadow:0 0 4px #ff0000}

/* KEYPAD */
.keypad-view{flex:1;display:flex;flex-direction:column;align-items:center;padding:16px;gap:12px;overflow:hidden}
.call-screen{width:100%;background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:16px;text-align:center;flex-shrink:0}
.call-number{font-family:'Courier New',monospace;font-size:26px;color:#fff;letter-spacing:4px;min-height:34px;text-shadow:0 0 8px rgba(255,100,100,0.5)}
.call-status{font-family:'Courier New',monospace;font-size:10px;color:rgba(255,255,255,0.45);letter-spacing:2px;margin-top:6px;text-transform:uppercase;min-height:16px}
.call-timer{font-family:'Courier New',monospace;font-size:22px;font-weight:bold;color:#ff4444;letter-spacing:3px;margin-top:6px;min-height:28px;text-shadow:0 0 10px rgba(255,0,0,0.6)}
.vu-wrap{width:100%;height:32px;border:1px solid rgba(255,255,255,0.15);border-radius:3px;background:rgba(0,0,0,0.5);position:relative;overflow:hidden;flex-shrink:0}
.vu-segs{position:absolute;inset:0;display:flex;align-items:flex-end;padding:2px;gap:1px}
.vu-seg{flex:1;border-radius:1px 1px 0 0}
.vu-cover{position:absolute;top:0;right:0;bottom:0;background:rgba(0,0,0,0.75);transition:width 0.08s;width:100%}
.rec-dot-row{display:flex;align-items:center;gap:8px;font-family:'Courier New',monospace;font-size:10px;color:rgba(255,255,255,0.5);letter-spacing:2px;text-transform:uppercase;justify-content:center;flex-shrink:0}
.rdot{width:8px;height:8px;border-radius:50%}
.blink{animation:bl 0.85s step-start infinite}
@keyframes bl{50%{opacity:0}}
.kpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;flex-shrink:0}
.kkey{height:56px;border-radius:10px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform 0.08s,background 0.08s;-webkit-tap-highlight-color:transparent}
.kkey:active{transform:scale(0.94);background:rgba(255,255,255,0.18)}
.kkey-num{font-family:'Courier New',monospace;font-size:20px;font-weight:bold;color:#fff;line-height:1;text-shadow:0 0 6px rgba(255,100,100,0.4)}
.kkey-alpha{font-family:'Courier New',monospace;font-size:7px;color:rgba(255,255,255,0.35);letter-spacing:1px;margin-top:2px}
.call-actions{display:flex;gap:20px;width:100%;justify-content:center;flex-shrink:0;padding:4px 0}
.ca-btn{width:68px;height:68px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px solid;transition:transform 0.08s;-webkit-tap-highlight-color:transparent}
.ca-btn:active{transform:scale(0.93)}
.btn-call{background:radial-gradient(circle at 38% 35%,#44cc44,#228822);border-color:rgba(100,255,100,0.3)}
.btn-end{background:radial-gradient(circle at 38% 35%,#ff3333,#aa0000);border-color:rgba(255,80,80,0.4)}
.perm-txt{font-family:'Courier New',monospace;font-size:9px;color:rgba(255,150,150,0.8);text-align:center;padding:0 8px;flex-shrink:0}
.dialing-dots span{display:inline-block;animation:dd 1.2s infinite}
.dialing-dots span:nth-child(2){animation-delay:0.2s}
.dialing-dots span:nth-child(3){animation-delay:0.4s}
@keyframes dd{0%,80%,100%{opacity:0.2}40%{opacity:1}}

/* REVIEW */
.review-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 24px;gap:22px}
.review-label{font-family:'Courier New',monospace;font-size:10px;color:rgba(255,255,255,0.35);letter-spacing:3px;text-transform:uppercase}
.review-time{font-family:'Courier New',monospace;font-size:52px;font-weight:bold;color:#ff4444;letter-spacing:5px;text-shadow:0 0 20px rgba(255,0,0,0.5);line-height:1}
.review-wave{display:flex;align-items:center;gap:2px;height:52px;width:100%}
.rwbar{flex:1;border-radius:2px;background:rgba(255,80,80,0.2)}
.rwbar.lit{background:#ff4444;box-shadow:0 0 4px rgba(255,0,0,0.5)}
.review-prog{width:100%;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden}
.review-prog-fill{height:100%;background:#ff4444;width:0%;transition:width 0.1s;box-shadow:0 0 4px #ff0000}
.review-actions{display:flex;gap:16px;width:100%;justify-content:center}
.ract{display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;flex:1;-webkit-tap-highlight-color:transparent}
.ract:active .ract-ico{transform:scale(0.91)}
.ract-ico{width:68px;height:68px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid;transition:transform 0.1s}
.ract-lbl{font-family:'Courier New',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;text-align:center}

/* SENT */
.sent-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
.sent-tick{width:80px;height:80px;border-radius:50%;background:radial-gradient(circle at 38% 35%,#44cc44,#116611);border:2px solid rgba(100,255,100,0.3);display:flex;align-items:center;justify-content:center}
.sent-lbl{font-family:'Courier New',monospace;font-size:12px;color:rgba(100,255,100,0.8);letter-spacing:3px;text-transform:uppercase}
</style>
</head>
<body>

<div class="shell" id="shell">

  <div class="bg"></div>
  <div class="dots"></div>
  <div class="wm">
    <svg width="220" height="220" viewBox="0 0 220 220" fill="none">
      <circle cx="110" cy="110" r="100" stroke="white" stroke-width="3" fill="none"/>
      <circle cx="110" cy="110" r="70" stroke="white" stroke-width="2" fill="none"/>
      <line x1="110" y1="10" x2="110" y2="210" stroke="white" stroke-width="2"/>
      <line x1="10" y1="110" x2="210" y2="110" stroke="white" stroke-width="2"/>
      <line x1="39" y1="39" x2="181" y2="181" stroke="white" stroke-width="1.5"/>
      <line x1="181" y1="39" x2="39" y2="181" stroke="white" stroke-width="1.5"/>
      <circle cx="110" cy="110" r="12" stroke="white" stroke-width="2" fill="none"/>
    </svg>
  </div>

  <div class="ui">

    <!-- SPLASH -->
    <div class="view active" id="vSplash">
      <div class="splash-body">
        <div class="splash-title">You have a message</div>
        <div class="splash-btns">
          <div class="splash-btn" onclick="goTo('vPhonebook')">
            <div class="sico">
              <svg width="52" height="52" viewBox="0 0 24 24" fill="none">
                <rect x="2" y="6" width="20" height="12" rx="6" stroke="white" stroke-width="2.2" fill="none"/>
                <circle cx="7" cy="12" r="3" stroke="white" stroke-width="2" fill="none"/>
                <circle cx="17" cy="12" r="3" stroke="white" stroke-width="2" fill="none"/>
                <line x1="10" y1="15" x2="14" y2="15" stroke="white" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </div>
            <div class="sico-lbl">Hear<br>voicemail</div>
          </div>
          <div class="splash-btn" onclick="goTo('vKeypad')">
            <div class="sico">
              <svg width="52" height="52" viewBox="0 0 24 24" fill="none">
                <path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z" stroke="white" stroke-width="2.2" fill="none" stroke-linejoin="round"/>
              </svg>
            </div>
            <div class="sico-lbl">Leave<br>message</div>
          </div>
        </div>
        <div class="select-bar"><span class="sel-txt">SELECT</span></div>
      </div>
    </div>

    <!-- PHONEBOOK -->
    <div class="view" id="vPhonebook">
      <div class="topbar">
        <span class="back-btn" onclick="goTo('vSplash');stopVM()">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="white"><polygon points="7,1 3,5 7,9"/></svg>Back
        </span>
        <span class="screen-title">Phonebook</span>
      </div>
      <div class="phonebook-list" id="phonebookList"></div>
    </div>

    <!-- PLAYER DETAIL -->
    <div class="view" id="vPlayer">
      <div class="topbar">
        <span class="back-btn" onclick="goTo('vPhonebook');stopVM()">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="white"><polygon points="7,1 3,5 7,9"/></svg>Back
        </span>
        <span class="screen-title" id="playerScreenTitle">Player</span>
      </div>
      <div class="player-screen" id="playerScreen"></div>
    </div>

    <!-- KEYPAD -->
    <div class="view" id="vKeypad">
      <div class="topbar">
        <span class="back-btn" onclick="cancelCall()">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="white"><polygon points="7,1 3,5 7,9"/></svg>Back
        </span>
        <span class="screen-title">Leave Message</span>
      </div>
      <div class="keypad-view">

        <div class="call-screen">
          <div class="call-number" id="dialNum">&nbsp;</div>
          <div class="call-status" id="callStatus">enter a number to call</div>
          <div class="call-timer" id="callTimer">&nbsp;</div>
        </div>

        <div class="vu-wrap" id="vuWrap" style="display:none">
          <div class="vu-segs">
            <div class="vu-seg" style="height:22%;background:#22ee44"></div>
            <div class="vu-seg" style="height:38%;background:#22ee44"></div>
            <div class="vu-seg" style="height:52%;background:#66cc22"></div>
            <div class="vu-seg" style="height:68%;background:#66cc22"></div>
            <div class="vu-seg" style="height:80%;background:#aacc00"></div>
            <div class="vu-seg" style="height:88%;background:#ddaa00"></div>
            <div class="vu-seg" style="height:93%;background:#ee6600"></div>
            <div class="vu-seg" style="height:97%;background:#ee3300"></div>
          </div>
          <div class="vu-cover" id="vuCover"></div>
        </div>

        <div class="rec-dot-row" id="recDotRow" style="display:none">
          <div class="rdot blink" id="rdot" style="background:#555"></div>
          <span id="recStatTxt">ready</span>
        </div>

        <div class="kpad" id="kpad">
          <div class="kkey" onclick="dialPress('1')"><span class="kkey-num">1</span><span class="kkey-alpha">&nbsp;</span></div>
          <div class="kkey" onclick="dialPress('2')"><span class="kkey-num">2</span><span class="kkey-alpha">ABC</span></div>
          <div class="kkey" onclick="dialPress('3')"><span class="kkey-num">3</span><span class="kkey-alpha">DEF</span></div>
          <div class="kkey" onclick="dialPress('4')"><span class="kkey-num">4</span><span class="kkey-alpha">GHI</span></div>
          <div class="kkey" onclick="dialPress('5')"><span class="kkey-num">5</span><span class="kkey-alpha">JKL</span></div>
          <div class="kkey" onclick="dialPress('6')"><span class="kkey-num">6</span><span class="kkey-alpha">MNO</span></div>
          <div class="kkey" onclick="dialPress('7')"><span class="kkey-num">7</span><span class="kkey-alpha">PQRS</span></div>
          <div class="kkey" onclick="dialPress('8')"><span class="kkey-num">8</span><span class="kkey-alpha">TUV</span></div>
          <div class="kkey" onclick="dialPress('9')"><span class="kkey-num">9</span><span class="kkey-alpha">WXYZ</span></div>
          <div class="kkey" onclick="dialPress('*')"><span class="kkey-num">*</span><span class="kkey-alpha">&nbsp;</span></div>
          <div class="kkey" onclick="dialPress('0')"><span class="kkey-num">0</span><span class="kkey-alpha">+</span></div>
          <div class="kkey" onclick="dialPress('#')"><span class="kkey-num">#</span><span class="kkey-alpha">&nbsp;</span></div>
        </div>

        <div class="call-actions">
          <!-- Green = start call + begin recording -->
          <div class="ca-btn btn-call" id="callBtn" onclick="startCall()">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="white">
              <path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/>
            </svg>
          </div>
          <!-- Red = end call + stop recording → review screen -->
          <div class="ca-btn btn-end" id="endBtn" onclick="endCall()" style="display:none">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
              <path d="M10.68 13.31a16 16 0 003.41 2.6l1.27-1.27a2 2 0 012.11-.45c1.12.45 2.3.67 3.53.67a2 2 0 012 2V20a2 2 0 01-2 2C10.43 22 2 13.57 2 3a2 2 0 012-2h3.5a2 2 0 012 2c0 1.25.22 2.45.64 3.57a2 2 0 01-.44 2.1L8.42 9.96"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </div>
        </div>

        <div class="perm-txt" id="permTxt"></div>
      </div>
    </div>

    <!-- REVIEW -->
    <div class="view" id="vReview">
      <div class="topbar">
        <span class="back-btn" onclick="reviewDiscard()">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="white"><polygon points="7,1 3,5 7,9"/></svg>Discard
        </span>
        <span class="screen-title">Review Message</span>
      </div>
      <div class="review-body">
        <div class="review-label">message recorded</div>
        <div class="review-time" id="reviewTime">0:00</div>
        <div class="review-wave" id="reviewWave"></div>
        <div class="review-prog"><div class="review-prog-fill" id="reviewFill"></div></div>
        <div class="review-actions">
          <div class="ract" onclick="reviewTogglePlay()">
            <div class="ract-ico" id="reviewPlayIco" style="background:radial-gradient(circle at 38% 35%,#3355aa,#112266);border-color:rgba(80,130,255,0.35)">
              <svg width="26" height="26" viewBox="0 0 24 24" fill="white" id="reviewPlaySvg"><polygon points="6,4 20,12 6,20"/></svg>
            </div>
            <div class="ract-lbl" style="color:rgba(100,150,255,0.8)">replay</div>
          </div>
          <div class="ract" onclick="reviewDiscard()">
            <div class="ract-ico" style="background:radial-gradient(circle at 38% 35%,#aa3333,#661111);border-color:rgba(255,80,80,0.35)">
              <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,6 5,6 21,6"/><path d="M19,6l-1,14H6L5,6"/><path d="M10,11v6M14,11v6"/><path d="M9,6V4h6v2"/></svg>
            </div>
            <div class="ract-lbl" style="color:rgba(255,100,100,0.8)">delete</div>
          </div>
          <div class="ract" onclick="reviewSend()">
            <div class="ract-ico" style="background:radial-gradient(circle at 38% 35%,#33aa33,#116611);border-color:rgba(80,255,80,0.35)">
              <svg width="26" height="26" viewBox="0 0 24 24" fill="white"><line x1="22" y1="2" x2="11" y2="13" stroke="white" stroke-width="2"/><polygon points="22,2 15,22 11,13 2,9"/></svg>
            </div>
            <div class="ract-lbl" style="color:rgba(100,255,100,0.8)">send</div>
          </div>
        </div>
      </div>
    </div>

    <!-- SENT CONFIRM -->
    <div class="view" id="vSent">
      <div class="sent-body">
        <div class="sent-tick">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20,6 9,17 4,12"/></svg>
        </div>
        <div class="sent-lbl">message sent</div>
      </div>
    </div>

  </div>

  <div class="scanlines"></div>
  <div class="vig"></div>
  <div class="flicker"></div>
  <canvas id="nc" class="nc"></canvas>
  <canvas id="cc" class="cc"></canvas>

</div>

<script>
/* ============================================================
   PLAYERS — update img and src paths to your own files
============================================================ */
const PLAYERS = [
  {id:'saka',       name:'SAKA. B',        status:'Online',      statusColor:'#44dd44', dur:12,  img:'photos/saka.jpg',        src:null},
  {id:'rice',       name:'RICE. D',        status:'Unavailable', statusColor:'#aaaaaa', dur:28,  img:'photos/rice.jpg',        src:null},
  {id:'russo',      name:'RUSSO. A',       status:'Online',      statusColor:'#44dd44', dur:9,   img:'photos/russo.jpg',       src:null},
  {id:'eze',        name:'EZE. E',         status:'Online',      statusColor:'#44dd44', dur:17,  img:'photos/eze.jpg',         src:null},
  {id:'havertz',    name:'HAVERTZ. K',     status:'Training',    statusColor:'#44dd44', dur:22,  img:'photos/havertz.jpg',     src:null},
  {id:'mead',       name:'MEAD. B',        status:'Matchday',    statusColor:'#aaaaaa', dur:15,  img:'photos/mead.jpg',        src:null},
  {id:'gabriel',    name:'GABRIEL. M',     status:'Matchday',    statusColor:'#aaaaaa', dur:31,  img:'photos/gabriel.jpg',     src:null},
  {id:'white',      name:'WHITE. B',       status:'Offline',     statusColor:'#666666', dur:8,   img:'photos/white.jpg',       src:null},
  {id:'saliba',     name:'SALIBA. W',      status:'Training',    statusColor:'#44dd44', dur:19,  img:'photos/saliba.jpg',      src:null},
  {id:'martinelli', name:'MARTINELLI. G',  status:'Online',      statusColor:'#44dd44', dur:14,  img:'photos/martinelli.jpg',  src:null},
];

const STATUS_STYLE = {
  'Online':      '#44dd44',
  'Unavailable': '#aaaaaa',
  'Offline':     '#666666',
  'Training':    '#44dd44',
  'Matchday':    '#aaaaaa',
};

/* ── 9:16 SIZING ─────────────────────────────────────────── */
function resize(){
  const shell=document.getElementById('shell');
  const vw=window.innerWidth, vh=window.innerHeight;
  const ratio=9/16;
  let w,h;
  if(vw/vh<=ratio){w=vw;h=Math.round(vw/ratio);}
  else{h=vh;w=Math.round(vh*ratio);}
  if(h>vh){h=vh;w=Math.round(vh*ratio);}
  shell.style.width=w+'px';
  shell.style.height=h+'px';
}
resize();
window.addEventListener('resize',resize);

/* ── NOISE ───────────────────────────────────────────── */
const ncEl=document.getElementById('nc'),nCtx=ncEl.getContext('2d');
function drawNoise(){
  const s=document.getElementById('shell');
  const w=s.offsetWidth||300,h=s.offsetHeight||640;
  ncEl.width=w;ncEl.height=h;
  const img=nCtx.createImageData(w,h);
  for(let i=0;i<img.data.length;i+=4){const v=Math.random()*255|0;img.data[i]=img.data[i+1]=img.data[i+2]=v;img.data[i+3]=255;}
  nCtx.putImageData(img,0,0);
}
drawNoise();setInterval(drawNoise,100);

const ccEl=document.getElementById('cc'),cCtx=ccEl.getContext('2d');
function drawChroma(){
  const s=document.getElementById('shell');
  const w=s.offsetWidth||300,h=s.offsetHeight||640;
  ccEl.width=w;ccEl.height=h;cCtx.clearRect(0,0,w,h);
  for(let y=0;y<Math.floor(h/2);y++){
    const yo=y*2,iv=Math.random()*0.06;
    if(iv>0.04){
      cCtx.fillStyle='rgba(255,0,0,'+iv+')';cCtx.fillRect(2,yo,w-4,1);
      cCtx.fillStyle='rgba(0,0,200,'+(iv*0.6)+')';cCtx.fillRect(-1,yo,w-2,1);
    }
  }
}
drawChroma();setInterval(drawChroma,160);

/* ── HELPERS ─────────────────────────────────────────────── */
function fmt(s){return Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60;}

function goTo(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='vPhonebook') renderPhonebook();
  if(id==='vKeypad') resetKeypad();
}

/* ── PHONEBOOK ───────────────────────────────────────────── */
let playingVM=-1,vmAudio=null,currentPlayer=null,_waveAnimInt=null;

function renderPhonebook(){
  const list=document.getElementById('phonebookList');
  list.innerHTML='';
  PLAYERS.forEach((p,i)=>{
    const color=STATUS_STYLE[p.status]||'#aaaaaa';
    const row=document.createElement('div');
    row.className='pb-row';
    const photoHTML=p.img
      ?'<div class="pb-photo-wrap"><img src="'+p.img+'" alt="'+p.name+'"/></div>'
      :'<div class="pb-photo-placeholder"><svg width="36" height="36" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" fill="none"/><path d="M4 20c0-4.4 3.6-8 8-8s8 3.6 8 8" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round" fill="none"/></svg></div>';
    row.innerHTML=photoHTML+
      '<div class="pb-info"><div class="pb-name">'+p.name+'</div>'+
      '<div class="pb-status" style="color:'+color+'">• '+p.status+'</div></div>'+
      '<div class="pb-prog-wrap"><div class="pb-prog-fill" id="pbp'+i+'"></div></div>';
    row.onclick=()=>openPlayer(i);
    list.appendChild(row);
  });
}

function openPlayer(i){
  stopVM();currentPlayer=i;
  const p=PLAYERS[i];
  const color=STATUS_STYLE[p.status]||'#aaaaaa';
  document.getElementById('playerScreenTitle').textContent=p.name;
  const wbars=Array.from({length:28},(_,j)=>{
    const h=Math.max(10,Math.floor(Math.random()*90));
    return '<div class="vm-wbar" id="wb'+j+'" style="height:'+h+'%;flex:1"></div>';
  }).join('');
  const photoHTML=p.img
    ?'<img src="'+p.img+'" alt="'+p.name+'"/>'
    :'<svg width="48" height="48" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="5" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" fill="none"/><path d="M3 20c0-5 4-9 9-9s9 4 9 9" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-linecap="round" fill="none"/></svg>';
  document.getElementById('playerScreen').innerHTML=
    '<div class="player-card">'+
      '<div class="player-card-photo">'+photoHTML+'</div>'+
      '<div class="player-card-name">'+p.name+'</div>'+
      '<div class="player-card-status" style="color:'+color+'">• '+p.status+'</div>'+
    '</div>'+
    '<div class="player-vm-section"><div class="vm-play-card">'+
    '<div class="vm-card-label">Voicemail &middot; '+fmt(p.dur)+'</div>'+
    '<div class="vm-waveform" id="playerWave">'+wbars+'</div>'+
    '<div class="vm-controls">'+
    '<div class="vm-big-play" id="playerPlayBtn" onclick="togglePlayerVM('+i+')">'+
    '<svg width="20" height="20" viewBox="0 0 20 20" fill="white"><polygon points="5,3 17,10 5,17"/></svg></div>'+
    '<div class="vm-duration" id="playerDur">'+fmt(p.dur)+'</div>'+
    '<div class="vm-progress"><div class="vm-progress-fill" id="playerFill"></div></div></div></div>'+
  goTo('vPlayer');
}

function togglePlayerVM(i){
  if(playingVM===i){stopVM();_resetPlayerBtn();return;}
  stopVM();playingVM=i;
  const p=PLAYERS[i];
  if(p.src){vmAudio=new Audio(p.src);_playVMAudio(i);}
  else _genAndPlay(p.dur,i);
}

function _genAndPlay(dur,i){
  try{
    const ac=new AudioContext();
    const buf=ac.createBuffer(1,ac.sampleRate*Math.min(dur,6),ac.sampleRate);
    const data=buf.getChannelData(0);
    for(let j=0;j<data.length;j++) data[j]=(Math.random()*2-1)*0.04*Math.exp(-j/(ac.sampleRate*4));
    const src=ac.createBufferSource();src.buffer=buf;
    const dest=ac.createMediaStreamDestination();
    src.connect(dest);src.start();
    const mr=new MediaRecorder(dest.stream);const ch=[];
    mr.ondataavailable=e=>ch.push(e.data);
    mr.onstop=()=>{vmAudio=new Audio(URL.createObjectURL(new Blob(ch,{type:'audio/webm'})));_playVMAudio(i);};
    mr.start();setTimeout(()=>mr.stop(),300);
  }catch(e){playingVM=-1;}
}

function _playVMAudio(i){
  vmAudio.play().catch(()=>{});
  vmAudio.ontimeupdate=()=>{
    const fill=document.getElementById('playerFill');
    const durEl=document.getElementById('playerDur');
    if(fill&&vmAudio.duration) fill.style.width=Math.round(vmAudio.currentTime/vmAudio.duration*100)+'%';
    if(durEl) durEl.textContent=fmt(Math.round(vmAudio.currentTime||0));
    _animPlayerWave(true);
  };
  vmAudio.onended=()=>{playingVM=-1;_resetPlayerBtn();_animPlayerWave(false);};
  const btn=document.getElementById('playerPlayBtn');
  if(btn) btn.innerHTML='<svg width="16" height="16" viewBox="0 0 16 16" fill="white"><rect x="3" y="2" width="4" height="12"/><rect x="9" y="2" width="4" height="12"/></svg>';
}

function _animPlayerWave(on){
  clearInterval(_waveAnimInt);
  if(on){_waveAnimInt=setInterval(()=>{
    for(let j=0;j<28;j++){const b=document.getElementById('wb'+j);if(b){b.style.height=Math.max(8,Math.floor(Math.random()*88)+8)+'%';b.classList.add('active');}}
  },120);}
  else{for(let j=0;j<28;j++){const b=document.getElementById('wb'+j);if(b){b.style.height=Math.max(10,Math.floor(Math.random()*40)+10)+'%';b.classList.remove('active');}}}
}

function _resetPlayerBtn(){
  clearInterval(_waveAnimInt);
  const btn=document.getElementById('playerPlayBtn');
  if(btn) btn.innerHTML='<svg width="20" height="20" viewBox="0 0 20 20" fill="white"><polygon points="5,3 17,10 5,17"/></svg>';
  const fill=document.getElementById('playerFill');if(fill) fill.style.width='0%';
  const durEl=document.getElementById('playerDur');
  if(durEl&&currentPlayer!==null) durEl.textContent=fmt(PLAYERS[currentPlayer].dur);
}

function stopVM(){
  clearInterval(_waveAnimInt);
  if(vmAudio){vmAudio.pause();vmAudio=null;}
  playingVM=-1;
}

/* ── KEYPAD & CALL FLOW ──────────────────────────────────── */
/* Flow: dial number → green button → ringtone → connected + auto-records
         → red button → timer stops → recording saves → review screen
         → replay / delete / send                                       */
let dialStr='',callState='idle',callInt=null,callSecs=0;
let isRec=false,waveInt=null;
let mediaRec=null,audioChunks=[],analyser=null,audioCtx=null;
let newMemos=[],reviewBlob=null,reviewDurSecs=0;
let reviewAudio=null,reviewPlaying=false;

function resetKeypad(){
  dialStr='';callState='idle';callSecs=0;
  clearInterval(callInt);clearInterval(waveInt);
  _killMic();
  document.getElementById('dialNum').innerHTML='&nbsp;';
  document.getElementById('callStatus').textContent='enter a number to call';
  document.getElementById('callTimer').innerHTML='&nbsp;';
  document.getElementById('vuWrap').style.display='none';
  document.getElementById('recDotRow').style.display='none';
  document.getElementById('kpad').style.display='grid';
  document.getElementById('callBtn').style.display='flex';
  document.getElementById('endBtn').style.display='none';
  document.getElementById('permTxt').textContent='';
  const vc=document.getElementById('vuCover');if(vc) vc.style.width='100%';
  const rdot=document.getElementById('rdot');if(rdot) rdot.style.background='#555';
  const rst=document.getElementById('recStatTxt');if(rst) rst.textContent='ready';
}

function dialPress(k){
  if(callState!=='idle') return;
  if(dialStr.length>=12) return;
  dialStr+=k;
  const d=document.getElementById('dialNum');
  if(d) d.textContent=dialStr.length<=4?dialStr:dialStr.length<=7?dialStr.slice(0,4)+' '+dialStr.slice(4):dialStr.slice(0,4)+' '+dialStr.slice(4,7)+' '+dialStr.slice(7);
  _dtmf(k);
}

function _dtmf(k){
  try{
    const ac=new AudioContext();
    const t={'1':[697,1209],'2':[697,1336],'3':[697,1477],'4':[770,1209],'5':[770,1336],'6':[770,1477],'7':[852,1209],'8':[852,1336],'9':[852,1477],'*':[941,1209],'0':[941,1336],'#':[941,1477]};
    const f=t[k]||[697,1336];
    f.forEach(freq=>{const o=ac.createOscillator(),g=ac.createGain();o.frequency.value=freq;g.gain.value=0.08;o.connect(g);g.connect(ac.destination);o.start();g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.15);o.stop(ac.currentTime+0.15);});
  }catch(e){}
}

/* Green button: start call → rings → connects → auto-starts recording */
function startCall(){
  if(callState!=='idle') return;
  if(!dialStr){document.getElementById('callStatus').textContent='enter a number first';return;}
  callState='dialing';
  document.getElementById('callBtn').style.display='none';
  document.getElementById('endBtn').style.display='flex';
  document.getElementById('kpad').style.display='none';
  document.getElementById('callStatus').innerHTML='<span class="dialing-dots"><span>.</span><span>.</span><span>.</span></span>&nbsp;dialing';
  _ring();
  setTimeout(()=>{
    if(callState!=='dialing') return;
    callState='connected';
    document.getElementById('callStatus').textContent='connected — recording';
    document.getElementById('callTimer').textContent='0:00';
    document.getElementById('vuWrap').style.display='block';
    document.getElementById('recDotRow').style.display='flex';
    callSecs=0;
    callInt=setInterval(()=>{
      callSecs++;
      const el=document.getElementById('callTimer');
      if(el) el.textContent=fmt(callSecs);
    },1000);
    _startRec();
  },2800);
}

/* Red button: end call → stops timer → stops recording → review screen */
function endCall(){
  if(callState!=='connected') return;
  clearInterval(callInt);  /* ← timer stops here */
  callState='ending';
  document.getElementById('callStatus').textContent='saving message...';
  _stopRec();  /* triggers _onRecStop via mediaRec.onstop */
}

function cancelCall(){
  clearInterval(callInt);
  _killMic();
  callState='idle';
  goTo('vSplash');
}

function _ring(){
  try{
    const ac=new AudioContext();let t=ac.currentTime;
    for(let i=0;i<4;i++){
      const o=ac.createOscillator(),g=ac.createGain();
      o.frequency.value=480;o.type='sine';
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.06,t+0.05);
      g.gain.setValueAtTime(0.06,t+0.35);g.gain.linearRampToValueAtTime(0,t+0.4);
      o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+0.5);t+=0.6;
    }
  }catch(e){}
}

async function _startRec(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    audioCtx=new AudioContext();analyser=audioCtx.createAnalyser();analyser.fftSize=64;
    audioCtx.createMediaStreamSource(stream).connect(analyser);
    mediaRec=new MediaRecorder(stream);audioChunks=[];
    mediaRec.ondataavailable=e=>audioChunks.push(e.data);
    mediaRec.onstop=_onRecStop;
    mediaRec.start();isRec=true;
    document.getElementById('rdot').style.background='#ff3333';
    document.getElementById('recStatTxt').textContent='recording...';
    waveInt=setInterval(()=>{
      if(!analyser) return;
      const d=new Uint8Array(analyser.frequencyBinCount);analyser.getByteFrequencyData(d);
      const avg=d.reduce((a,b)=>a+b,0)/d.length;
      const vc=document.getElementById('vuCover');
      if(vc) vc.style.width=Math.max(0,Math.min(100,100-avg/128*100))+'%';
    },80);
  }catch(e){
    clearInterval(callInt);callState='idle';
    resetKeypad();
    document.getElementById('permTxt').textContent='Microphone access needed — allow in browser settings';
  }
}

function _stopRec(){
  clearInterval(waveInt);
  if(mediaRec&&isRec){mediaRec.stop();mediaRec.stream.getTracks().forEach(t=>t.stop());}
  isRec=false;
}

function _killMic(){
  clearInterval(waveInt);
  if(mediaRec&&isRec){try{mediaRec.stop();mediaRec.stream.getTracks().forEach(t=>t.stop());}catch(e){}}
  isRec=false;mediaRec=null;analyser=null;
  if(audioCtx){try{audioCtx.close();}catch(e){}}audioCtx=null;
}

/* Called when MediaRecorder finishes — build review and navigate */
function _onRecStop(){
  reviewDurSecs=callSecs;
  reviewBlob=new Blob(audioChunks,{type:'audio/webm'});
  _buildReview();
  goTo('vReview');
}

/* ── REVIEW SCREEN ───────────────────────────────────────── */
function _buildReview(){
  document.getElementById('reviewTime').textContent=fmt(reviewDurSecs);
  document.getElementById('reviewFill').style.width='0%';
  const wave=document.getElementById('reviewWave');
  wave.innerHTML='';
  for(let i=0;i<32;i++){
    const d=document.createElement('div');
    d.className='rwbar';
    d.style.height=Math.max(10,Math.floor(Math.random()*85)+10)+'%';
    wave.appendChild(d);
  }
  reviewPlaying=false;
  _setReviewPlayBtn(false);
  if(reviewAudio){reviewAudio.pause();reviewAudio=null;}
}

function _setReviewPlayBtn(playing){
  const ico=document.getElementById('reviewPlaySvg');
  if(!ico) return;
  ico.innerHTML=playing
    ?'<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>'
    :'<polygon points="6,4 20,12 6,20"/>';
}

function reviewTogglePlay(){
  if(reviewPlaying){
    if(reviewAudio) reviewAudio.pause();
    reviewPlaying=false;
    _setReviewPlayBtn(false);
    return;
  }
  if(!reviewBlob) return;
  reviewAudio=new Audio(URL.createObjectURL(reviewBlob));
  reviewPlaying=true;
  _setReviewPlayBtn(true);
  reviewAudio.play().catch(()=>{});
  reviewAudio.ontimeupdate=()=>{
    const fill=document.getElementById('reviewFill');
    if(fill&&reviewAudio.duration) fill.style.width=Math.round(reviewAudio.currentTime/reviewAudio.duration*100)+'%';
    const bars=document.querySelectorAll('.rwbar');
    const prog=reviewAudio.duration?reviewAudio.currentTime/reviewAudio.duration:0;
    bars.forEach((b,i)=>b.classList.toggle('lit',i/bars.length<prog));
  };
  reviewAudio.onended=()=>{reviewPlaying=false;_setReviewPlayBtn(false);};
}

function reviewDiscard(){
  if(reviewAudio){reviewAudio.pause();reviewAudio=null;}
  reviewBlob=null;reviewPlaying=false;
  goTo('vSplash');
}

function reviewSend(){
  if(reviewAudio){reviewAudio.pause();reviewAudio=null;}
  if(reviewBlob) newMemos.push({url:URL.createObjectURL(reviewBlob),dur:reviewDurSecs});
  reviewBlob=null;reviewPlaying=false;
  goTo('vSent');
  setTimeout(()=>goTo('vSplash'),2200);
}

renderPhonebook();
</script>
